<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simionic Custom Profile Manager</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <!-- Left column: disk/iPad operations -->
    <div class="left-column">
      <button id="btn-open" class="btn">Open from disk</button>
      <button id="btn-extract" class="btn">Extract from iPad</button>
      <button id="btn-save" class="btn" disabled>Save to disk</button>
      <button id="btn-push" class="btn" disabled>Push to iPad</button>
    </div>

    <!-- Center: Profile list -->
    <div class="center-column">
      <label class="profiles-label">Profiles</label>
      <select id="profile-list" class="profile-list" multiple size="15">
      </select>
    </div>

    <!-- Right column: export/import/settings -->
    <div class="right-column">
      <div class="ipad-info">
        <div class="ipad-row">
          <span class="ipad-label">iPad:</span>
          <span id="ipad-name" class="ipad-name">none</span>
        </div>
        <span id="ipad-status" class="ipad-status">Ready to connect</span>
      </div>
      <button id="btn-export" class="btn" disabled>Export selected</button>
      <button id="btn-remove" class="btn" disabled>Remove selected</button>
      <button id="btn-import" class="btn" disabled>Import profiles</button>
      <label class="checkbox-label">
        <input type="checkbox" id="suppress-alerts"> Suppress alerts
      </label>
    </div>
  </div>

  <!-- Device picker modal -->
  <dialog id="device-dialog">
    <div class="dialog-content">
      <h3>Select iPad</h3>
      <select id="device-list" size="5" class="device-list"></select>
      <div class="dialog-buttons">
        <button id="dialog-extract" class="btn" disabled>Extract</button>
        <button id="dialog-cancel" class="btn">Cancel</button>
      </div>
    </div>
  </dialog>

  <script src="../../dist/renderer/renderer.js" type="module"></script>
</body>
</html>
